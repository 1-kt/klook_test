<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 320px; padding: 12px; font-family: Arial; }
    h3 { margin: 0 0 10px; font-size: 14px; }
    label { font-size: 12px; color: #666; }
    textarea { width: 100%; height: 200px; font-family: monospace; font-size: 11px; resize: vertical; border: 1px solid #ddd; border-radius: 4px; padding: 8px; margin-top: 4px; }
    button { width: 100%; padding: 10px; margin-top: 10px; cursor: pointer; background: #4285f4; color: white; border: none; border-radius: 4px; font-size: 14px; }
    button:hover { background: #3367d6; }
    #status { margin-top: 10px; font-size: 12px; text-align: center; }
  </style>
</head>
<body>
  <h3>🖱️ Auto Clicker</h3>
  <label>配置信息 (JSON - 支持订单格式或简化格式):</label>
  <textarea id="jsonInput">{
  "order_id": 12114,
  "travel_date": "2026-04-05",
  "time_slot": "13:00",
  "pax": 4,
  "contact_first_name": "Donnela",
  "contact_last_name": "Green-Johnson",
  "contact_email": "order@reotrip.com",
  "contact_mobile": "+18434214844"
}</textarea>

  <button id="runBtn">执行脚本</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
